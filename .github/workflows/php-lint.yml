name: PHP Lint

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/php-lint.yml'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/php-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Lint PHP files
        run: find . -name '*.php' -print0 | xargs -0 -n1 php -l
